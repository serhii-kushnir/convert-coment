<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Word Formatter</title>

    <style>

        body{
            font-family: Arial;
            background:#1e1e1e;
            color:white;
            padding:40px;
        }

        h1{
            text-align:center;
        }

        textarea{
            width:100%;
            height:200px;
            margin-top:10px;
            padding:15px;
            font-size:16px;
            border-radius:10px;
            border:none;
        }

        button{
            margin-top:20px;
            padding:15px 25px;
            font-size:18px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .result{
            margin-top:30px;
        }

    </style>
</head>
<body>

<h1>Word Formatter</h1>

<form action="/convert" method="post">

    <label>Встав список:</label>

    <textarea name="text"
              th:text="${input}"></textarea>

    <button type="submit">
        Конвертувати
    </button>

</form>

<div class="result" th:if="${result}">

    <h2>Результат:</h2>

    <textarea id="resultArea"
              th:text="${result}"
              readonly></textarea>

    <button onclick="copyText()">
        Скопіювати
    </button>

</div>

<script>

    function copyText(){

        let text =
            document.getElementById("resultArea");

        text.select();

        navigator.clipboard.writeText(text.value);

        alert("Скопійовано!");
    }

</script>

</body>
</html>
